<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IPTV Player{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Início</a></li>
                <li><a href="{{ url_for('tv') }}">TV</a></li>
                <li><a href="{{ url_for('series') }}">Séries</a></li>
                <li><a href="{{ url_for('filmes') }}">Filmes</a></li>
                <li><a href="{{ url_for('radio') }}">Rádio</a></li>
                <li><a href="{{ url_for('favoritos') }}">Favoritos</a></li>
                <li><a href="{{ url_for('perfil') }}">Perfil</a></li>
                <li><a href="{{ url_for('logout') }}">Sair</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
