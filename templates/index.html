<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player M3U</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #1e1e2f;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        h1 {
            text-align: center;
            color: #ffaa00;
        }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
        }
        .sidebar {
            width: 350px;
            background: #2a2a3a;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .upload-area {
            background: #33334a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        input[type="file"] {
            display: none;
        }
        .upload-label {
            background: #ffaa00;
            color: #1e1e2f;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .upload-label:hover {
            background: #ffc34d;
        }
        .channel-list {
            flex: 1;
            overflow-y: auto;
            background: #33334a;
            border-radius: 8px;
            padding: 10px;
        }
        .channel-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #40405a;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .channel-item:hover {
            background: #5a5a7a;
        }
        .channel-item.selected {
            background: #ffaa00;
            color: #1e1e2f;
            font-weight: bold;
        }
        .channel-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
            border-radius: 4px;
            background: #2a2a3a;
        }
        .channel-info {
            flex: 1;
        }
        .channel-name {
            font-size: 14px;
        }
        .channel-group {
            font-size: 12px;
            color: #aaa;
        }
        .player-area {
            flex: 1;
            background: #000;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            outline: none;
        }
        .status {
            padding: 10px;
            text-align: center;
            color: #aaa;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #6bff6b;
        }
    </style>
</head>
<body>
    <h1>📺 Player de Listas M3U</h1>
    <div class="container">
        <div class="sidebar">
            <div class="upload-area">
                <input type="file" id="fileInput" accept=".m3u,.m3u8">
                <label for="fileInput" class="upload-label">📂 Escolher arquivo M3U</label>
                <div id="uploadStatus" class="status">Nenhum arquivo carregado</div>
            </div>
            <div class="channel-list" id="channelList">
                <div class="status">Carregue um arquivo para ver os canais</div>
            </div>
        </div>
        <div class="player-area">
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <!-- Biblioteca hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const channelListDiv = document.getElementById('channelList');
        const videoPlayer = document.getElementById('videoPlayer');
        let currentHls = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            uploadStatus.textContent = `📤 Enviando ${file.name}...`;
            channelListDiv.innerHTML = '<div class="status">Processando...</div>';

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(async res => {
                // Tratamento específico para 413 (Request Entity Too Large)
                if (res.status === 413) {
                    // Tenta ler a resposta como JSON (se o backend retornar JSON)
                    try {
                        const data = await res.json();
                        throw new Error(data.error || 'Arquivo muito grande.');
                    } catch {
                        throw new Error('Arquivo muito grande. O limite é 100MB. Se você usa nginx, pode precisar aumentar client_max_body_size.');
                    }
                }
                const contentType = res.headers.get('content-type');
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`HTTP ${res.status}: ${text.substring(0, 200)}`);
                }
                if (contentType && contentType.includes('application/json')) {
                    return res.json();
                } else {
                    const text = await res.text();
                    throw new Error(`Resposta não é JSON: ${text.substring(0, 200)}`);
                }
            })
            .then(data => {
                if (data.error) throw new Error(data.error);
                uploadStatus.textContent = `✅ ${data.channels.length} canais carregados`;
                renderChannelList(data.channels);
            })
            .catch(err => {
                uploadStatus.textContent = `❌ Erro: ${err.message}`;
                channelListDiv.innerHTML = `<div class="status error">Falha ao processar o arquivo</div>`;
                console.error(err);
            });
        });

        function renderChannelList(channels) {
            if (channels.length === 0) {
                channelListDiv.innerHTML = '<div class="status">Nenhum canal encontrado</div>';
                return;
            }

            let html = '';
            channels.forEach((channel, index) => {
                const name = escapeHtml(channel.name || 'Canal sem nome');
                const group = channel['group-title'] ? escapeHtml(channel['group-title']) : '';
                const logo = channel['tvg-logo'] || '';
                const encodedUrl = encodeURIComponent(channel.url);
                html += `
                    <div class="channel-item" data-url="${encodedUrl}" data-name="${name}" data-group="${group}" data-logo="${logo}">
                        ${logo ? `<img class="channel-logo" src="${logo}" alt="" onerror="this.style.display='none'">` : '<div style="width:30px"></div>'}
                        <div class="channel-info">
                            <div class="channel-name">${name}</div>
                            ${group ? `<div class="channel-group">${group}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            channelListDiv.innerHTML = html;

            document.querySelectorAll('.channel-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');

                    const encodedUrl = this.dataset.url;
                    const url = decodeURIComponent(encodedUrl);
                    const name = this.dataset.name;
                    playStream(url, name);
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function playStream(originalUrl, name) {
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            const proxyUrl = `/proxy?url=${encodeURIComponent(originalUrl)}`;
            console.log(`Reproduzindo ${name}: ${proxyUrl}`);

            if (originalUrl.toLowerCase().includes('.m3u8')) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    currentHls = hls;
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(videoPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        videoPlayer.play().catch(e => console.log('Autoplay bloqueado:', e));
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        console.error('Erro HLS:', data);
                        uploadStatus.textContent = '❌ Erro ao carregar stream HLS';
                    });
                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    videoPlayer.src = proxyUrl;
                    videoPlayer.load();
                    videoPlayer.play().catch(e => console.log('Autoplay bloqueado:', e));
                } else {
                    alert('HLS não é suportado neste navegador.');
                }
            } else {
                videoPlayer.src = proxyUrl;
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log('Autoplay bloqueado:', e));
            }
        }
    </script>
</body>
</html>
