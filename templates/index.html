{% extends "base.html" %}
{% block title %}Início{% endblock %}
{% block content %}
<h1 class="section-title">Para você</h1>

<h2 class="section-title">Filmes recomendados</h2>
<div class="horizontal-scroll" id="filmes-recomendados"></div>

<h2 class="section-title">Séries recomendadas</h2>
<div class="horizontal-scroll" id="series-recomendadas"></div>

<h2 class="section-title">Assistido recentemente</h2>
<div class="horizontal-scroll" id="recentes"></div>
{% endblock %}
{% block scripts %}
<script>
    function carregarSecao(url, containerId) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                // Ajuste conforme o retorno da API /api/inicio
                // Supondo que data.filmes_recomendados, etc.
                if (containerId === 'filmes-recomendados') {
                    data.filmes_recomendados.forEach(item => {
                        container.insertAdjacentHTML('beforeend', window.cardTemplate(item, 'filme'));
                    });
                } else if (containerId === 'series-recomendadas') {
                    data.series_recomendadas.forEach(item => {
                        container.insertAdjacentHTML('beforeend', window.cardTemplate(item, 'serie'));
                    });
                } else if (containerId === 'recentes') {
                    data.assistido_recentemente.forEach(item => {
                        container.insertAdjacentHTML('beforeend', window.cardTemplate(item, item.tipo));
                    });
                }
            });
    }

    carregarSecao('/api/inicio', 'filmes-recomendados');
    carregarSecao('/api/inicio', 'series-recomendadas');
    carregarSecao('/api/inicio', 'recentes');
</script>
{% endblock %}
