{% extends "base.html" %}
{% block title %}TV{% endblock %}
{% block content %}
<h1>Canais de TV</h1>
<input type="text" id="search" placeholder="Pesquisar canais...">
<div class="grid" id="channel-grid">
    {% for canal in canais %}
    <div class="card" data-nome="{{ canal.nome|lower }}">
        <img src="{{ canal.logo }}" alt="{{ canal.nome }}" onerror="this.src='{{ url_for('static', filename='images/placeholder.png') }}'">
        <h3>{{ canal.nome }}</h3>
        <a href="{{ url_for('play', id=canal.id) }}" class="btn">Assistir</a>
        <button class="favorito" data-id="{{ canal.id }}">⭐</button>
    </div>
    {% endfor %}
</div>
{% endblock %}
