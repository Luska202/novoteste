{% extends "base.html" %}
{% block title %}TV{% endblock %}
{% block content %}
<h1 class="section-title">Canais de TV</h1>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="Pesquisar canais...">
    <button id="search-btn" class="search-btn">Pesquisar</button>
</div>

<h2 class="section-title">Todos os canais (A-Z)</h2>
<div class="category-grid" id="todos-canais"></div>
<div class="load-more-container">
    <button id="load-more" class="btn btn-outline" style="display: none;">Carregar Mais</button>
</div>
{% endblock %}
{% block scripts %}
<script>
    let currentPage = 1;

    function carregarLista(pagina) {
        fetch(`/api/tv/lista?pagina=${pagina}`)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('todos-canais');
                data.itens.forEach(item => {
                    container.insertAdjacentHTML('beforeend', window.cardTemplate(item, 'tv'));
                });
                const btn = document.getElementById('load-more');
                if (data.pagina < data.total_paginas) {
                    btn.style.display = 'block';
                    btn.dataset.page = data.pagina + 1;
                } else {
                    btn.style.display = 'none';
                }
            });
    }

    carregarLista(1);

    document.getElementById('load-more').addEventListener('click', function() {
        const nextPage = parseInt(this.dataset.page);
        carregarLista(nextPage);
    });

    window.setupSearch('search-input', 'search-btn');
</script>
{% endblock %}
