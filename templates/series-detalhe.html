{% extends "base.html" %}
{% block title %}{{ serie_nome }}{% endblock %}
{% block content %}
<h1>{{ serie_nome }}</h1>
<div id="temporadas">
    {% for temp, epis in temporadas.items() %}
    <div class="temporada">
        <h2>Temporada {{ temp }}</h2>
        <div class="episodios">
            {% for ep in epis %}
            <div class="episodio">
                <a href="{{ url_for('play', id=ep.id) }}">Episódio {{ ep.episodio }}: {{ ep.nome }}</a>
                <button class="favorito" data-id="{{ ep.id }}">⭐</button>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
