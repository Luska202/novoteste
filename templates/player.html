{% extends "base.html" %}
{% block title %}{{ canal.nome }}{% endblock %}
{% block content %}
<div class="player-page">
    <h1>{{ canal.nome }}</h1>
    <div class="video-wrapper">
        <video
            id="video-player"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            poster="{{ canal.logo }}"
            data-setup='{"fluid": true}'
        >
            <source src="{{ url_for('proxy', url=canal.url) }}" type="video/mp4">
            <p class="vjs-no-js">
                Seu navegador não suporta vídeo HTML5.
            </p>
        </video>
    </div>
    <div class="player-info">
        <button id="favorito-btn" class="btn {% if is_favorito %}favorito-ativo{% endif %}" data-id="{{ canal.id }}">
            <i class="fas fa-heart"></i> Favoritar
        </button>
        <p>Categoria: {{ canal.categoria or 'Geral' }}</p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const player = videojs('video-player');
        const canalId = {{ canal.id }};

        // Carregar progresso
        fetch(`/progresso/${canalId}`)
            .then(res => res.json())
            .then(data => {
                if (data.tempo > 0) {
                    player.currentTime(data.tempo);
                }
            });

        // Salvar progresso a cada 10 segundos
        player.on('timeupdate', function() {
            const current = Math.floor(player.currentTime());
            const duration = Math.floor(player.duration());
            if (current % 10 === 0 && current > 0) {
                fetch(`/progresso/${canalId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tempo: current, duracao: duration})
                });
            }
        });

        // Favoritar
        document.getElementById('favorito-btn').addEventListener('click', function() {
            const id = this.dataset.id;
            fetch(`/favoritar/${id}`, {method: 'POST'})
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'adicionado') {
                        this.classList.add('favorito-ativo');
                    } else {
                        this.classList.remove('favorito-ativo');
                    }
                });
        });
    });
</script>
{% endblock %}
