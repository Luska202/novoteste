{% extends "base.html" %}
{% block title %}Filmes{% endblock %}
{% block content %}
<h1>Filmes</h1>

<!-- Pesquisa -->
<div class="search-bar">
    <input type="text" id="search-input" placeholder="Pesquisar filmes...">
    <button id="search-btn">Pesquisar</button>
</div>

<!-- Seções de categoria (rolagem lateral) -->
<div class="categorias-grid">
    <div class="categoria-row">
        <h2>Lançamento</h2>
        <div class="horizontal-scroll" id="lancamentos"></div>
    </div>
    <div class="categoria-row">
        <h2>Comédia</h2>
        <div class="horizontal-scroll" id="comedia"></div>
    </div>
    <div class="categoria-row">
        <h2>Ação (Thriller)</h2>
        <div class="horizontal-scroll" id="acao"></div>
    </div>
    <div class="categoria-row">
        <h2>Romance</h2>
        <div class="horizontal-scroll" id="romance"></div>
    </div>
</div>

<!-- Lista completa A-Z com paginação -->
<h2>Todos os filmes</h2>
<div class="grid" id="filmes-lista"></div>
<div class="pagination">
    <button id="carregar-mais" data-pagina="1" data-total="">Carregar mais</button>
</div>
{% endblock %}

{% block scripts %}
<script>
    let filmesData = []; // armazena todos os filmes para filtro de pesquisa
    let currentPage = 1;
    let totalPages = 1;
    let searchTerm = '';

    document.addEventListener('DOMContentLoaded', function() {
        carregarCategorias();
        carregarListaFilmes(1, '');

        document.getElementById('search-btn').addEventListener('click', function() {
            searchTerm = document.getElementById('search-input').value.trim();
            currentPage = 1;
            document.getElementById('filmes-lista').innerHTML = '';
            carregarListaFilmes(currentPage, searchTerm);
        });

        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                window.setupSearch('search-input', 'search-btn');
            }
        });

        document.getElementById('carregar-mais').addEventListener('click', function() {
            if (currentPage < totalPages) {
                currentPage++;
                carregarListaFilmes(currentPage, searchTerm);
            }
        });
    });

    function carregarCategorias() {
        // Lançamentos
        fetch('/api/filmes/lancamento')
            .then(res => res.json())
            .then(data => preencherLinha('lancamentos', data, 'filme'));

        // Comédia
        fetch('/api/filmes/categoria/Comédia')
            .then(res => res.json())
            .then(data => preencherLinha('comedia', data, 'filme'));

        // Ação (Thriller)
        fetch('/api/filmes/categoria/Thriller')
            .then(res => res.json())
            .then(data => preencherLinha('acao', data, 'filme'));

        // Romance
        fetch('/api/filmes/categoria/Romance')
            .then(res => res.json())
            .then(data => preencherLinha('romance', data, 'filme'));
    }

    function carregarListaFilmes(pagina, termo) {
        let url = `/api/filmes/lista?pagina=${pagina}`;
        if (termo) {
            // Idealmente teria uma API de busca, mas por enquanto filtra localmente
            // Vamos carregar todos e filtrar no front? Melhor implementar busca no backend.
            // Para simplificar, farei filtro local após carregar.
        }
        fetch(url)
            .then(res => res.json())
            .then(data => {
                totalPages = data.total_paginas;
                let itens = data.itens;
                if (termo) {
                    itens = itens.filter(item => item.nome.toLowerCase().includes(termo.toLowerCase()));
                }
                filmesData = filmesData.concat(itens);
                exibirFilmes(itens, pagina === 1);
                if (pagina >= totalPages) {
                    document.getElementById('carregar-mais').style.display = 'none';
                } else {
                    document.getElementById('carregar-mais').style.display = 'block';
                }
            });
    }

    function exibirFilmes(itens, limpar) {
        const container = document.getElementById('filmes-lista');
        if (limpar) container.innerHTML = '';
        itens.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.logo || '/static/images/placeholder.png'}" alt="${item.nome}" onerror="this.src='/static/images/placeholder.png'">
                <h3>${item.nome}</h3>
                <a href="/play/${item.id}" class="btn">Assistir</a>
                <button class="favorito" data-id="${item.id}">⭐</button>
            `;
            container.appendChild(card);
        });
    }

    function preencherLinha(elementId, itens, tipo) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        itens.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card-horizontal';
            card.innerHTML = `
                <img src="${item.logo || '/static/images/placeholder.png'}" alt="${item.nome}" onerror="this.src='/static/images/placeholder.png'">
                <h4>${item.nome}</h4>
                <a href="/play/${item.id}" class="btn-small">Assistir</a>
            `;
            container.appendChild(card);
        });
    }
</script>
{% endblock %}
