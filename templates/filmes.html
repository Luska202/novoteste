{% extends "base.html" %}
{% block title %}Filmes{% endblock %}
{% block content %}
<h1>Filmes</h1>
<input type="text" id="search" placeholder="Pesquisar filmes...">
{% for cat, filmes_lista in categorias.items() %}
<h2>{{ cat }}</h2>
<div class="grid" data-categoria="{{ cat|lower }}">
    {% for filme in filmes_lista %}
    <div class="card" data-nome="{{ filme.nome|lower }}">
        <img src="{{ filme.logo }}" alt="{{ filme.nome }}" onerror="this.src='{{ url_for('static', filename='images/placeholder.png') }}'">
        <h3>{{ filme.nome }}</h3>
        <a href="{{ url_for('filme_detalhe', id=filme.id) }}" class="btn">Ver detalhes</a>
        <button class="favorito" data-id="{{ filme.id }}">⭐</button>
    </div>
    {% endfor %}
</div>
{% endfor %}
{% endblock %}
