{% extends "base.html" %}
{% block title %}Favoritos{% endblock %}
{% block content %}
<h1>Meus Favoritos</h1>
<div class="grid">
    {% for fav in favoritos %}
    <div class="card">
        <img src="{{ fav.canal.logo }}" alt="{{ fav.canal.nome }}">
        <h3>{{ fav.canal.nome }}</h3>
        <a href="{{ url_for('play', id=fav.canal.id) }}" class="btn">Assistir</a>
        <button class="favorito" data-id="{{ fav.canal.id }}">⭐ Remover</button>
    </div>
    {% endfor %}
</div>
{% endblock %}
