{% extends "base.html" %}
{% block title %}Favoritos{% endblock %}
{% block content %}
<h1>Meus Favoritos</h1>
<div class="grid" id="favoritos-lista"></div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/favoritos')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('favoritos-lista');
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.logo || '/static/images/placeholder.png'}" alt="${item.nome}">
                        <h3>${item.nome}</h3>
                        <a href="/play/${item.id}" class="btn">Assistir</a>
                        <button class="favorito" data-id="${item.id}">⭐ Remover</button>
                    `;
                    container.appendChild(card);
                });
            });
    });
</script>
{% endblock %}
