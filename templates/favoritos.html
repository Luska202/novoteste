{% extends "base.html" %}
{% block title %}Favoritos{% endblock %}
{% block content %}
<h1 class="section-title">Meus Favoritos</h1>
<div class="category-grid" id="favoritos-grid">
    <!-- preenchido via API -->
</div>
{% endblock %}
{% block scripts %}
<script>
    fetch('/api/favoritos')
        .then(res => res.json())
        .then(data => {
            const grid = document.getElementById('favoritos-grid');
            if (data.length === 0) {
                grid.innerHTML = '<p>Você ainda não tem favoritos.</p>';
                return;
            }
            data.forEach(item => {
                grid.insertAdjacentHTML('beforeend', window.cardTemplate(item, item.tipo));
            });
        });
</script>
{% endblock %}
