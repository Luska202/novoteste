{% extends "base.html" %}
{% block title %}Séries{% endblock %}
{% block content %}
<h1>Séries</h1>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="Pesquisar séries...">
    <button id="search-btn">Pesquisar</button>
</div>

<div class="categorias-grid">
    <div class="categoria-row">
        <h2>Lançamento</h2>
        <div class="horizontal-scroll" id="lancamentos"></div>
    </div>
    <div class="categoria-row">
        <h2>Comédia</h2>
        <div class="horizontal-scroll" id="comedia"></div>
    </div>
    <div class="categoria-row">
        <h2>Ação (Thriller)</h2>
        <div class="horizontal-scroll" id="acao"></div>
    </div>
    <div class="categoria-row">
        <h2>Romance</h2>
        <div class="horizontal-scroll" id="romance"></div>
    </div>
</div>

<h2>Todas as séries</h2>
<div class="grid" id="series-lista"></div>
<div class="pagination">
    <button id="carregar-mais" data-pagina="1" data-total="">Carregar mais</button>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let searchTerm = '';

    document.addEventListener('DOMContentLoaded', function() {
        carregarCategorias();
        carregarListaSeries(1, '');

        document.getElementById('search-btn').addEventListener('click', function() {
            searchTerm = document.getElementById('search-input').value.trim();
            currentPage = 1;
            document.getElementById('series-lista').innerHTML = '';
            carregarListaSeries(currentPage, searchTerm);
        });

        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });

        document.getElementById('carregar-mais').addEventListener('click', function() {
            if (currentPage < totalPages) {
                currentPage++;
                carregarListaSeries(currentPage, searchTerm);
            }
        });
    });

    function carregarCategorias() {
        fetch('/api/series/lancamento')
            .then(res => res.json())
            .then(data => preencherLinha('lancamentos', data, 'serie'));

        fetch('/api/series/categoria/Comédia')
            .then(res => res.json())
            .then(data => preencherLinha('comedia', data, 'serie'));

        fetch('/api/series/categoria/Thriller')
            .then(res => res.json())
            .then(data => preencherLinha('acao', data, 'serie'));

        fetch('/api/series/categoria/Romance')
            .then(res => res.json())
            .then(data => preencherLinha('romance', data, 'serie'));
    }

    function carregarListaSeries(pagina, termo) {
        let url = `/api/series/lista?pagina=${pagina}`;
        fetch(url)
            .then(res => res.json())
            .then(data => {
                totalPages = data.total_paginas;
                let itens = data.itens;
                if (termo) {
                    itens = itens.filter(item => item.nome.toLowerCase().includes(termo.toLowerCase()));
                }
                exibirSeries(itens, pagina === 1);
                if (pagina >= totalPages) {
                    document.getElementById('carregar-mais').style.display = 'none';
                } else {
                    document.getElementById('carregar-mais').style.display = 'block';
                }
            });
    }

    function exibirSeries(itens, limpar) {
        const container = document.getElementById('series-lista');
        if (limpar) container.innerHTML = '';
        itens.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.logo || '/static/images/placeholder.png'}" alt="${item.nome}" onerror="this.src='/static/images/placeholder.png'">
                <h3>${item.nome}</h3>
                <a href="/serie/${encodeURIComponent(item.serie_nome)}" class="btn">Ver episódios</a>
                <button class="favorito" data-id="${item.id}">⭐</button>
            `;
            container.appendChild(card);
        });
    }

    function preencherLinha(elementId, itens, tipo) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        itens.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card-horizontal';
            card.innerHTML = `
                <img src="${item.logo || '/static/images/placeholder.png'}" alt="${item.nome}" onerror="this.src='/static/images/placeholder.png'">
                <h4>${item.nome}</h4>
                <a href="/play/${item.id}" class="btn-small">Assistir</a>
            `;
            container.appendChild(card);
        });
    }
</script>
{% endblock %}
