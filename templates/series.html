{% extends "base.html" %}
{% block title %}Séries{% endblock %}
{% block content %}
<h1>Séries</h1>
<input type="text" id="search" placeholder="Pesquisar séries...">
<div class="grid" id="series-grid">
    {% for serie in series %}
    <div class="card" data-nome="{{ serie.nome|lower }}">
        <img src="{{ serie.logo }}" alt="{{ serie.nome }}" onerror="this.src='{{ url_for('static', filename='images/placeholder.png') }}'">
        <h3>{{ serie.nome }}</h3>
        <a href="{{ url_for('serie_detalhe', nome=serie.nome) }}" class="btn">Ver detalhes</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
