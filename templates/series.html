{% extends "base.html" %}
{% block title %}Séries{% endblock %}
{% block content %}
<h1 class="section-title">Séries</h1>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="Pesquisar séries...">
    <button id="search-btn" class="search-btn">Pesquisar</button>
</div>

<h2 class="section-title">Lançamento</h2>
<div class="horizontal-scroll" id="lancamento"></div>

<h2 class="section-title">Comédia</h2>
<div class="horizontal-scroll" id="comedia"></div>

<h2 class="section-title">Drama</h2>
<div class="horizontal-scroll" id="drama"></div>

<h2 class="section-title">Ação</h2>
<div class="horizontal-scroll" id="acao"></div>

<h2 class="section-title">Todas as séries (A-Z)</h2>
<div class="category-grid" id="todas-series"></div>
<div class="load-more-container">
    <button id="load-more" class="btn btn-outline" style="display: none;">Carregar Mais</button>
</div>
{% endblock %}
{% block scripts %}
<script>
    function carregarCategoria(url, containerId) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                data.forEach(item => {
                    container.insertAdjacentHTML('beforeend', window.cardTemplate(item, 'serie'));
                });
            });
    }

    carregarCategoria('/api/series/lancamento', 'lancamento');
    carregarCategoria('/api/series/categoria/Comédia', 'comedia');
    carregarCategoria('/api/series/categoria/Drama', 'drama');
    carregarCategoria('/api/series/categoria/Ação', 'acao');

    function carregarLista(pagina) {
        fetch(`/api/series/lista?pagina=${pagina}`)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('todas-series');
                data.itens.forEach(item => {
                    container.insertAdjacentHTML('beforeend', window.cardTemplate(item, 'serie'));
                });
                const btn = document.getElementById('load-more');
                if (data.pagina < data.total_paginas) {
                    btn.style.display = 'block';
                    btn.dataset.page = data.pagina + 1;
                } else {
                    btn.style.display = 'none';
                }
            });
    }

    carregarLista(1);

    document.getElementById('load-more').addEventListener('click', function() {
        const nextPage = parseInt(this.dataset.page);
        carregarLista(nextPage);
    });

    window.setupSearch('search-input', 'search-btn');
</script>
{% endblock %}
